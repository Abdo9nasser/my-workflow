name: Ultimate Enterprise DevSecOps Pipeline

on:
  pull_request:
    branches: [ main, dev ]
  push:
    branches: [ main, dev ]

permissions:
  id-token: write
  contents: write

jobs:
  # ---------------------------------------------------------
  # 1. مرحلة الاختبار والجودة (تشتغل مع أي PR أو Push على dev أو main)
  # ---------------------------------------------------------
  code-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Super-Linter
        uses: super-linter/super-linter@v5
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Install Dependencies & Run Tests
        run: |
          npm ci
          npm test

  # ---------------------------------------------------------
  # 2. مرحلة البناء والأمان (تشتغل فقط بعد الـ Merge وجوه الـ push)
  # ---------------------------------------------------------
  build-and-secure:
    runs-on: ubuntu-latest
    needs: code-verification
    if: github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image Locally
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/realworld-app:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/realworld-app:${{ github.ref_name }}

      - name: Scan Image via Trivy for Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/realworld-app:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Verified Docker Image to Registry
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/realworld-app:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/realworld-app:${{ github.ref_name }}

  # ---------------------------------------------------------
  # 3. مرحلة الـ Deploy على بيئة الـ Staging (تلقائي لو الكود على فرع dev)
  # ---------------------------------------------------------
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-secure
    if: github.ref_name == 'dev' && github.event_name == 'push'
    environment: staging
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update Staging Image Tag
        run: |
          cd k8s/overlays/staging
          kubectl kustomize edit set image ${{ secrets.DOCKERHUB_USERNAME }}/realworld-app=${{ secrets.DOCKERHUB_USERNAME }}/realworld-app:${{ github.sha }}

      - name: Commit and Push to Staging GitOps
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/staging/kustomization.yaml
          git commit -m "chore(deploy): staging release ${{ github.sha }} [skip ci]"
          git push origin dev

  # ---------------------------------------------------------
  # 4. مرحلة الـ Deploy على بيئة الـ Production (تلقائي لو الكود على فرع main)
  # ---------------------------------------------------------
  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-secure
    if: github.ref_name == 'main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update Production Image Tag
        run: |
          cd k8s/overlays/production
          kubectl kustomize edit set image ${{ secrets.DOCKERHUB_USERNAME }}/realworld-app=${{ secrets.DOCKERHUB_USERNAME }}/realworld-app:${{ github.sha }}

      - name: Commit and Push to Production GitOps
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/production/kustomization.yaml
          git commit -m "chore(deploy): production release ${{ github.sha }} [skip ci]"
          git push origin main